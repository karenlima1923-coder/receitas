  </div>`);
  document.body.appendChild(cook);
  const beep=()=>{ try{ const a=new (window.AudioContext||window.webkitAudioContext)(); const o=a.createOscillator(),g=a.createGain(); o.connect(g);g.connect(a.destination); o.type='sine';o.frequency.value=880; g.gain.setValueAtTime(.001,a.currentTime); g.gain.exponentialRampToValueAtTime(.4,a.currentTime+.05); o.start();
      g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.8); o.stop(a.currentTime+.85);}catch(e){} };
  const pausarTimer=()=>{ tRun=false; clearInterval(tick); cook.querySelector('[data-cstart]').textContent='▶ Iniciar'; };
  function mostra(){
    pausarTimer();
    const p=passos[idx];
    cook.querySelector('[data-cnt]').textContent=`Passo ${idx+1} de ${passos.length}`;
    cook.querySelector('[data-cn]').textContent=`Passo ${idx+1}`;
    cook.querySelector('[data-ct]').textContent=p;
    cook.querySelector('[data-cprog]').style.width=`${((idx+1)/passos.length)*100}%`;
    cook.querySelector('[data-cprev]').disabled=idx===0;
    const next=cook.querySelector('[data-cnext]'); next.textContent= idx===passos.length-1?'✓ Concluir':'Próximo →';
    tDur=duracaoPasso(p); tLeft=tDur;
    const tw=cook.querySelector('[data-ctimer]');
    if(tDur){ tw.style.display='flex'; cook.querySelector('[data-cclock]').textContent=fmtTimer(tLeft); }
    else tw.style.display='none';
  }
  cook.querySelector('[data-cstart]').onclick=()=>{
    if(tRun){ pausarTimer(); return; }
    tRun=true; cook.querySelector('[data-cstart]').textContent='⏸ Pausar';
    tick=setInterval(()=>{ tLeft--; cook.querySelector('[data-cclock]').textContent=fmtTimer(Math.max(0,tLeft));
      if(tLeft<=0){ pausarTimer(); beep(); toast('⏰ Tempo do passo!'); } },1000);
  };
  cook.querySelector('[data-creset]').onclick=()=>{ pausarTimer(); tLeft=tDur; cook.querySelector('[data-cclock]').textContent=fmtTimer(tLeft); };
  cook.querySelector('[data-cprev]').onclick=()=>{ if(idx>0){idx--;mostra();} };
  cook.querySelector('[data-cnext]').onclick=()=>{ if(idx<passos.length-1){idx++;mostra();} else { fecha(); marcarFeito(r); } };
  function fecha(){ pausarTimer(); cook.remove(); }
  cook.querySelector('[data-cx]').onclick=fecha;
  mostra();
}

/* ---------- formulário criar/editar ---------- */
const UNIDS=['g','kg','ml','L','xícara(s)','colher(es) de sopa','colher(es) de chá','unidade(s)','dente(s)','fatia(s)','pitada(s)','a gosto','—'];
const ABREV=['g','kg','ml','L'];
const optsUnid=(sel)=>UNIDS.map(u=>`<option ${u===sel?'selected':''}>${u}</option>`).join('');
// monta a linha de ingrediente num texto que o app entende e escala
function compoeIngrediente(q,u,n){
  n=(n||'').trim(); if(!n) return '';
  q=(q||'').trim().replace(',', '.');
  if(!q) return n;
  if(u==='a gosto') return `${n} a gosto`;
  if(u==='—'||u==='unidade(s)') return `${q} ${n}`;            // ex.: "3 ovos"
  if(ABREV.includes(u)) return `${q}${u} de ${n}`;              // ex.: "500g de farinha"
  return `${q} ${u} de ${n}`;                                   // ex.: "2 xícara(s) de leite"
}
// tenta separar uma linha existente em {q,u,n} (para edição) — com fallback seguro
function decompoeIngrediente(linha){
  linha=String(linha||'').trim(); if(!linha) return {q:'',u:'—',n:''};
  let m=linha.match(/^(\d+(?:[.,]\d+)?(?:\/\d+)?)\s*(kg|g|ml|l)\s+de\s+(.+)$/i);
  if(m){ let u=m[2].toLowerCase(); u=(u==='l'?'L':u); return {q:m[1],u,n:m[3]}; }
  m=linha.match(/^(\d+(?:[.,]\d+)?(?:\/\d+)?)\s+(.+)$/);
  if(m && !/\sde\s/.test(m[2])) return {q:m[1],u:'—',n:m[2]};   // ex.: "3 ovos"
  return {q:'',u:'—',n:linha};                                  // mantém a linha original
}

function openForm(r){
  const editing=!!(r&&r.id);
  const c=cap();
  // bloqueio de permissão
  if(editing && !podeEditarReceita(r)){ toast('Você só pode editar suas próprias receitas'); return; }
  if(!editing && !c.podeIncluir){
    toast((usuario||{}).status==='suspenso'?'Acesso suspenso — fale com o administrador':'Acesso expirado — renove para incluir receitas');
    return;
  }
  const podeImg = c.podeImagem; // imagens só para admin (custo de Storage)
  const opts=CATS.map(cc=>`<option value="${cc.slug}" ${r&&r.categoria===cc.slug?'selected':''}>${cc.emoji} ${cc.nome}</option>`).join('');
  const campoImagem = podeImg
    ? `<div class="field"><label>Imagem (link)</label>
        <input id="f_img" value="${editing?esc(r.imagem||''):''}" placeholder="https://… cole o endereço de uma foto">
        <div class="help">Cole o link de uma imagem da web. Deixe em branco para usar o ícone.</div>
        <div class="imgprev" id="f_prev"><img id="f_previmg" alt=""></div>
      </div>`
    : `<div class="field"><label>Imagem</label>
        <div class="help" style="color:var(--mut2)">🔒 Adicionar imagem é um recurso de administrador. Sua receita usará o ícone da categoria.</div>
      </div>`;
  const m=el(`<div class="modal" role="dialog" aria-modal="true">
    <div class="form-title">${editing?'Editar receita':'Nova receita'}</div>
    <div class="mscroll">
      <div class="field"><label>Título</label><input id="f_titulo" value="${editing?esc(r.titulo):''}" placeholder="Ex.: Bolo de fubá cremoso"></div>
      <div class="field"><label>Categoria</label><select id="f_cat">${opts}</select></div>
      <div class="frow">
        <div class="field"><label>Tempo (min)</label><input id="f_tempo" type="number" min="1" value="${editing?r.tempoMin:''}" placeholder="30"></div>
        <div class="field"><label>Porções</label><input id="f_porc" value="${editing?esc(r.porcoes||''):''}" placeholder="4 porções"></div>
        <div class="field"><label>Dificuldade</label><select id="f_dif">
          ${['Fácil','Médio','Difícil'].map(d=>`<option ${editing&&r.dificuldade===d?'selected':''}>${d}</option>`).join('')}
        </select></div>
      </div>
      ${campoImagem}
      <div class="field"><label>Emoji (opcional)</label><input id="f_emoji" maxlength="4" value="${editing?esc(r.emoji||''):''}" placeholder="🍰"></div>
      <div class="field"><label>Tags / dietas</label>
        <div class="tagchips" id="f_tags">${TAGS.map(t=>`<button type="button" data-ftag="${t.slug}" class="tagchip ${editing&&(r.tags||[]).includes(t.slug)?'on':''}">${t.emoji} ${t.nome}</button>`).join('')}</div>
        <div class="help">Clique para marcar. Aparecem como filtro nas listas.</div>
      </div>
      <div class="field">
        <div class="sechead"><label>Ingredientes</label><span class="badge" id="f_ingc">0 itens</span></div>
        <div id="f_ing"></div>
        <button type="button" class="addline" id="f_addIng">＋ Adicionar ingrediente</button>
        <div class="help">Quantidade · unidade · ingrediente. Ex.: <b>500 · g · farinha</b>. Assim o app recalcula tudo ao mudar a porção.</div>
      </div>
      <div class="field">
        <div class="sechead"><label>Modo de preparo</label><span class="badge" id="f_prepc">0 passos</span></div>
        <div id="f_prep"></div>
        <button type="button" class="addline" id="f_addStep">＋ Adicionar passo</button>
        <div class="help">Um passo de cada vez. Se escrever um tempo (“asse por 40 min”), o app cria um cronômetro no modo cozinhar.</div>
      </div>
    </div>
    <div class="mfoot">
      <button class="bsoft" data-close>Cancelar</button><span class="grow"></span>
      <button class="bacc" data-save>${editing?'Salvar alterações':'Adicionar receita'}</button>
    </div></div>`);
  // prévia da imagem (só quando o campo existe)
  const inputImg=m.querySelector('#f_img');
  if(inputImg){
    const prev=m.querySelector('#f_prev'), prevImg=m.querySelector('#f_previmg');
    const atualizaPrev=()=>{
      const u=inputImg.value.trim();
      if(!u){prev.classList.remove('on');return;}
      prevImg.onerror=()=>prev.classList.remove('on');
      prevImg.onload=()=>prev.classList.add('on');
      prevImg.src=u;
    };
    inputImg.addEventListener('input',atualizaPrev); atualizaPrev();
  }

  m.querySelectorAll('[data-ftag]').forEach(b=>b.onclick=()=>b.classList.toggle('on'));

  // ----- construtor de ingredientes e passos (Modelo 1) -----
  const boxIng=m.querySelector('#f_ing'), boxPrep=m.querySelector('#f_prep');
  function contaIng(){ const k=boxIng.children.length; m.querySelector('#f_ingc').textContent=k+(k===1?' item':' itens'); }
  function numPrep(){ boxPrep.querySelectorAll('.steprow .num').forEach((n,i)=>n.textContent=i+1); const k=boxPrep.children.length; m.querySelector('#f_prepc').textContent=k+(k===1?' passo':' passos'); }
  function addIngRow(q='',u='g',n=''){
    const d=el(`<div class="ingrow">
      <input class="f-q" inputmode="decimal" placeholder="500" value="${esc(String(q))}">
      <select class="f-u">${optsUnid(u)}</select>
      <input class="f-n" placeholder="farinha de trigo" value="${esc(n)}">
      <button type="button" class="rmrow" title="Remover">✕</button>
    </div>`);
    d.querySelector('.rmrow').onclick=()=>{ d.remove(); contaIng(); };
    boxIng.appendChild(d); contaIng();
  }
  function addStepRow(txt=''){
    const d=el(`<div class="steprow"><span class="num"></span><textarea placeholder="Descreva este passo…">${esc(txt)}</textarea><button type="button" class="rmrow" title="Remover">✕</button></div>`);
    d.querySelector('.rmrow').onclick=()=>{ d.remove(); numPrep(); };
    boxPrep.appendChild(d); numPrep();
  }
  m.querySelector('#f_addIng').onclick=()=>addIngRow();
  m.querySelector('#f_addStep').onclick=()=>addStepRow();
  if(editing && (r.ingredientes||[]).length){ r.ingredientes.forEach(l=>{ const p=decompoeIngrediente(l); addIngRow(p.q,p.u,p.n); }); } else { addIngRow('','g',''); }
  if(editing && (r.preparo||[]).length){ r.preparo.forEach(p=>addStepRow(p)); } else { addStepRow(''); }

  m.querySelector('[data-close]').onclick=closeOverlay;
  m.querySelector('[data-save]').onclick=async()=>{
    const titulo=m.querySelector('#f_titulo').value.trim();
    if(!titulo){ const t=m.querySelector('#f_titulo'); t.focus(); t.style.borderColor='#ff8a8a'; return; }
    const tags=[...m.querySelectorAll('[data-ftag].on')].map(b=>b.dataset.ftag);
    const rec={
      id: editing?r.id:undefined, favorito: editing?r.favorito:false, criadoEm: editing?r.criadoEm:undefined,
      autorId: editing?(r.autorId||null):(usuario?usuario.id:null),
      titulo, categoria:m.querySelector('#f_cat').value, emoji:m.querySelector('#f_emoji').value.trim(),
      imagem: inputImg?inputImg.value.trim():(editing?(r.imagem||''):''),
      tempoMin:+m.querySelector('#f_tempo').value||0, porcoes:m.querySelector('#f_porc').value.trim(), dificuldade:m.querySelector('#f_dif').value,
      rating: editing?r.rating:5.0, tags, views: editing?(r.views||0):0,
      ingredientes:[...boxIng.querySelectorAll('.ingrow')].map(row=>compoeIngrediente(row.querySelector('.f-q').value, row.querySelector('.f-u').value, row.querySelector('.f-n').value)).filter(Boolean),
      preparo:[...boxPrep.querySelectorAll('.steprow textarea')].map(t=>t.value.trim()).filter(Boolean),
    };
    if(!rec.ingredientes.length){ toast('Adicione pelo menos um ingrediente'); return; }
    await store.saveRecipe(rec); closeOverlay(); toast(editing?'Receita atualizada':'Receita adicionada ✨');
    renderSidebar(); render();
  };
  showOverlay(m);
  setTimeout(()=>m.querySelector('#f_titulo')?.focus(),60);
}

/* ---------- overlay / toast ---------- */
let overlayTimer;
function showOverlay(node){clearTimeout(overlayTimer);const o=$('#overlay');o.innerHTML='';o.appendChild(node);o.classList.add('on');}
function closeOverlay(){clearTimeout(overlayTimer);$('#overlay').classList.remove('on');overlayTimer=setTimeout(()=>$('#overlay').innerHTML='',180);}
$('#overlay').addEventListener('click',e=>{if(e.target===$('#overlay'))closeOverlay();});
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeOverlay();});
let tT; function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('on');clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('on'),2200);}

/* ---------- busca ---------- */
let sT; $('#search').addEventListener('input',e=>{clearTimeout(sT);sT=setTimeout(()=>{resetSel();termo=e.target.value.trim();render();},180);});
$('#btnAdd').onclick=()=>openForm();
// mobile: gaveta + menu inferior
$('#mBurger')?.addEventListener('click',abrirDrawer);
$('#mAvatar')?.addEventListener('click',abrirDrawer);
$('#bnMenu')?.addEventListener('click',abrirDrawer);
$('#scrim')?.addEventListener('click',fecharDrawer);
document.querySelectorAll('#botnav [data-nav]').forEach(b=>b.addEventListener('click',()=>navegar(b.dataset.nav)));
document.addEventListener('click',e=>{ if(!e.target.closest('.menu')) document.querySelectorAll('.pop.on').forEach(p=>p.classList.remove('on')); });

window.boot = boot;
