<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mise · Receitas</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Carrega as implementações Firebase (dados + login) e inicia o app.
     Se não carregar (ex.: aberto por file://), o app cai no modo local automaticamente. -->
<script type="module">
  window.__moduleRan = true;
  try {
    const m = await import('./firestore-store.js');
    window.FirestoreStore = m.FirestoreStore;
    window.FirebaseAuthProvider = m.FirebaseAuthProvider;
  } catch (e) {
    console.warn('Firebase não carregou — rodando em modo local (IndexedDB):', e);
  }
  if (window.boot) window.boot();
</script>
<style>
  :root{
    --bg:#0A0D14; --panel:#11151E; --line:rgba(255,255,255,.08);
    --acc:#3D7BFF; --acc2:#7A5CFF; --acc-bright:#8FB4FF; --acc-on:#06122e;
    --feat-a:#1e3c78; --feat-b:#0c1830;
    --txt:#E9EEF2; --mut:#8a949c; --mut2:#6b7780;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  /* scrollbar fina e discreta (resolve a barra grossa feia) */
  *{scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.16) transparent}
  *::-webkit-scrollbar{width:10px;height:10px}
  *::-webkit-scrollbar-track{background:transparent}
  *::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px;border:2px solid transparent;background-clip:content-box}
  *::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.26);background-clip:content-box}
  body{background:var(--bg);color:var(--txt);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
  a{text-decoration:none;color:inherit}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  input,select,textarea{font-family:inherit}
  ::selection{background:var(--acc);color:#06122e}
  :focus-visible{outline:2px solid var(--acc-bright);outline-offset:2px}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}html{scroll-behavior:auto}}

  .shell{display:flex;max-width:1340px;margin:0 auto;min-height:100vh}

  /* ===== sidebar ===== */
  aside{width:264px;flex:0 0 264px;padding:14px;position:sticky;top:14px;height:calc(100vh - 28px);margin:14px 0 14px 14px;
    display:flex;flex-direction:column;gap:5px;overflow:auto;
    background:rgba(255,255,255,.035);border:1px solid var(--line);border-radius:24px}
  .logo{font-family:'Sora';font-weight:800;font-size:20px;display:flex;align-items:center;gap:9px;padding:8px 8px 16px}
  .logo .sq{width:32px;height:32px;border-radius:10px;background:var(--acc);color:var(--acc-on);display:grid;place-items:center;font-size:16px}
  .navlbl{font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--mut2);padding:14px 12px 5px;font-weight:700}
  .nlink{display:flex;align-items:center;gap:11px;padding:11px 13px;border-radius:14px;color:#9aa7b1;font-size:14.5px;font-weight:500;transition:.16s;width:100%;text-align:left}
  .nlink .e{font-size:16px;width:20px;text-align:center}
  .nlink:hover{background:rgba(255,255,255,.05);color:#fff}
  .nlink.on{background:var(--acc);color:var(--acc-on);font-weight:700}
  .nlink .ct{margin-left:auto;font-size:12px;color:var(--mut2);font-weight:600}
  .nlink.on .ct{color:var(--acc-on);opacity:.85}
  .profile{margin-top:auto;display:flex;align-items:center;gap:10px;padding:11px;border-radius:13px;background:rgba(255,255,255,.04);border:1px solid var(--line)}
  .profile .av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:grid;place-items:center;font-size:14px;font-weight:700;color:var(--acc-on);flex:0 0 auto}
  .profile b{font-size:13px;display:flex;align-items:center;gap:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .profile span{font-size:11px;color:var(--mut2);display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .rb{font-size:9.5px;font-weight:800;letter-spacing:.03em;padding:2px 6px;border-radius:6px;text-transform:uppercase;flex:0 0 auto}
  .rb.adm{background:color-mix(in srgb,var(--acc) 22%,transparent);color:var(--acc-bright)}
  .rb.ok{background:rgba(52,211,153,.18);color:#6ee7b7}
  .rb.exp{background:rgba(245,180,80,.18);color:#fbbf24}
  .rb.sus{background:rgba(255,90,90,.18);color:#ff9a9a}
  .demo{margin-top:8px;background:rgba(255,255,255,.03);border:1px dashed var(--line);border-radius:11px;padding:9px 10px}
  .demo span{font-size:10.5px;color:var(--mut2);display:block;margin-bottom:5px;font-weight:600}
  .demo select{width:100%;background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:8px;color:var(--txt);font-size:12.5px;padding:7px 8px;outline:none}

  /* banner de status (acesso) */
  .banner{display:flex;align-items:center;gap:12px;border-radius:14px;padding:13px 16px;margin-bottom:22px;font-size:14px;border:1px solid}
  .banner.warn{background:rgba(245,180,80,.1);border-color:rgba(245,180,80,.35);color:#fcd9a0}
  .banner.bad{background:rgba(255,90,90,.1);border-color:rgba(255,90,90,.35);color:#ffc2c2}
  .banner .bi{font-size:18px}
  .banner b{color:#fff}

  /* admin */
  .adminhead{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap}
  .adminhead .kpi{display:flex;gap:10px;margin-left:auto;flex-wrap:wrap}
  .kpi .box{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:16px;padding:12px 16px;font-size:12.5px;color:var(--mut);min-width:92px}
  .kpi .box b{display:block;font-family:'Sora';font-size:22px;color:#fff}
  .utable{width:100%;border-collapse:separate;border-spacing:0 9px}
  .utable th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut2);padding:0 14px 4px;font-weight:700}
  .utable td{background:rgba(255,255,255,.035);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:14px;font-size:13.5px;vertical-align:middle}
  .utable td:first-child{border-left:1px solid var(--line);border-radius:14px 0 0 14px}
  .utable td:last-child{border-right:1px solid var(--line);border-radius:0 14px 14px 0}
  .uname{display:flex;align-items:center;gap:10px}
  .uname .av{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:grid;place-items:center;font-size:13px;font-weight:700;color:var(--acc-on);flex:0 0 auto}
  .uname b{font-size:13.5px}.uname span{font-size:11.5px;color:var(--mut2)}
  .tag{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:4px 9px;border-radius:999px}
  .tag.ok{background:rgba(52,211,153,.16);color:#6ee7b7}
  .tag.exp{background:rgba(245,180,80,.16);color:#fbbf24}
  .tag.sus{background:rgba(255,90,90,.16);color:#ff9a9a}
  .tag.adm{background:color-mix(in srgb,var(--acc) 20%,transparent);color:var(--acc-bright)}
  .tag.life{background:rgba(56,189,248,.16);color:#7dd3fc}
  /* corrige opções de dropdown ilegíveis (texto claro sobre fundo branco do SO) */
  select option{background:#1b2230;color:#E9EEF2}
  /* barra de ferramentas do admin */
  .atools{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .asearch{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:11px;padding:0 14px;flex:1;min-width:200px}
  .asearch input{background:none;border:none;outline:none;color:var(--txt);font-size:14px;padding:10px 0;width:100%}
  .afilters{display:flex;gap:6px;flex-wrap:wrap}
  .afilters button{font-size:12.5px;font-weight:600;padding:8px 12px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:#9aa7b1}
  .afilters button:hover{color:#fff}
  .afilters button.on{background:var(--acc);color:var(--acc-on);border-color:transparent}
  .field .seg2{display:flex;gap:8px;flex-wrap:wrap}
  /* olho mostrar/ocultar senha */
  .pwrap{position:relative}
  .pwrap input{padding-right:44px}
  .eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);width:32px;height:32px;border-radius:8px;display:grid;place-items:center;font-size:16px;color:var(--mut);background:none}
  .eye:hover{background:rgba(255,255,255,.06);color:#fff}
  /* seleção múltipla de receitas */
  .seltool{display:flex;align-items:center;gap:12px;margin-bottom:16px}
  .seltool button{font-size:13.5px;font-weight:600;padding:9px 14px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:#cdd6dd}
  .seltool button.on{background:var(--acc);color:var(--acc-on);border-color:transparent}
  .seltool span{font-size:13px;color:var(--mut)}
  .grid.selecting .card{cursor:pointer}
  .grid.selecting .card .fav{display:none}
  .card.sel{outline:2px solid var(--acc);outline-offset:2px}
  .card .ckbox{position:absolute;top:10px;right:10px;width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.8);background:rgba(10,12,16,.55);display:grid;place-items:center;font-size:15px;color:transparent;z-index:2}
  .card .ckbox.on{background:var(--acc);border-color:var(--acc);color:#fff}
  /* barra flutuante de ações em massa */
  .selbar,.ubar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);z-index:200;
    display:flex;align-items:center;gap:12px;background:var(--panel);border:1px solid color-mix(in srgb,var(--acc) 40%,transparent);
    padding:11px 14px 11px 18px;border-radius:14px;box-shadow:0 20px 50px -20px #000;opacity:0;pointer-events:none;transition:.2s}
  .selbar.on,.ubar.on{opacity:1;pointer-events:auto;transform:translateX(-50%)}
  .selbar span,.ubar span{font-size:13.5px;font-weight:600}
  .selbar .bacc,.ubar button{padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:700}
  .ubar button{background:rgba(255,255,255,.06);border:1px solid var(--line);color:#cdd6dd}
  .ubar button.del{color:#ff9a9a;border-color:rgba(255,90,90,.35)}
  .ubar button.x{color:var(--mut)}
  /* checkboxes do admin */
  .utable input[type=checkbox],.eye + *{accent-color:var(--acc)}
  .utable .ckcol{width:36px;text-align:center}
  .utable input[type=checkbox]{width:17px;height:17px;cursor:pointer;accent-color:var(--acc)}
  .uacts{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .uacts button{font-size:12px;font-weight:600;padding:7px 10px;border-radius:9px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:#cdd6dd;transition:.15s}
  .uacts button:hover{background:rgba(255,255,255,.12);color:#fff}
  .uacts button.danger{color:#ff9a9a}
  .uacts .menu{position:relative}
  .uacts .pop{position:absolute;right:0;top:calc(100% + 4px);z-index:5;background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:6px;display:none;flex-direction:column;min-width:170px;box-shadow:0 20px 40px -16px #000}
  .uacts .pop.on{display:flex}
  .uacts .pop button{text-align:left;background:none;border:none;border-radius:8px}
  .uacts .pop button:hover{background:rgba(255,255,255,.08)}
  @media(max-width:760px){.utable thead{display:none}.utable td{display:block;border:1px solid var(--line);border-radius:10px;margin-top:-1px}.utable tr{display:block;margin-bottom:10px}.uacts{justify-content:flex-start}}

  /* ===== tela de login ===== */
  .authgate{position:fixed;inset:0;z-index:300;display:none;align-items:center;justify-content:center;padding:24px;
    background:radial-gradient(120% 100% at 20% 0%,#16213a,#0A0D14 60%),var(--bg);overflow:auto}
  .authgate.on{display:flex}
  .authcard{width:100%;max-width:420px;background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:30px 28px;box-shadow:0 40px 90px -40px #000}
  .authcard .brand{display:flex;align-items:center;gap:10px;font-family:'Sora';font-weight:800;font-size:22px;margin-bottom:4px}
  .authcard .brand .sq{width:34px;height:34px;border-radius:10px;background:var(--acc);color:var(--acc-on);display:grid;place-items:center;font-size:18px}
  .authcard .sub{color:var(--mut);font-size:14px;margin-bottom:22px}
  .authtabs{display:flex;background:rgba(255,255,255,.05);border-radius:11px;padding:4px;gap:3px;margin-bottom:20px}
  .authtabs button{flex:1;padding:9px;border-radius:8px;font-size:14px;font-weight:700;color:var(--mut)}
  .authtabs button.on{background:var(--acc);color:var(--acc-on)}
  .authcard .field{margin-bottom:14px}
  .autherr{background:rgba(255,90,90,.12);border:1px solid rgba(255,90,90,.35);color:#ffc2c2;font-size:13px;padding:10px 12px;border-radius:10px;margin-bottom:14px;display:none}
  .autherr.on{display:block}
  .authcard .bacc{width:100%;justify-content:center;display:flex;padding:13px;font-size:15px;margin-top:4px}
  .demoaccts{margin-top:20px;border-top:1px solid var(--line);padding-top:16px}
  .demoaccts .t{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut2);font-weight:700;margin-bottom:10px}
  .demoaccts .da{display:flex;gap:8px}
  .demoaccts .da button{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:9px 6px;font-size:12px;font-weight:600;color:#cdd6dd;display:flex;flex-direction:column;gap:2px;align-items:center}
  .demoaccts .da button:hover{border-color:var(--acc);color:#fff}
  .demoaccts .da button small{font-size:9.5px;color:var(--mut2);font-weight:600}
  .logoutbtn{margin-top:8px;width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:11px;padding:10px;font-size:13px;font-weight:600;color:#cdd6dd;display:flex;align-items:center;justify-content:center;gap:7px}
  .logoutbtn:hover{background:rgba(255,90,90,.12);border-color:rgba(255,90,90,.35);color:#ffc2c2}

  /* filtros e ordenação */
  .filtros{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px}
  .filtros select{background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:11px;color:var(--txt);font-size:13.5px;padding:9px 12px;outline:none}
  .tagchips{display:flex;gap:6px;flex-wrap:wrap}
  .tagchip{font-size:12.5px;font-weight:600;padding:7px 12px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:#9aa7b1}
  .tagchip:hover{color:#fff}
  .tagchip.on{background:var(--acc);color:var(--acc-on);border-color:transparent}
  .rtags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
  .rtag{font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;background:rgba(255,255,255,.06);color:#aab6bf}
  .mtags{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}
  .mtag{font-size:12px;font-weight:600;padding:5px 10px;border-radius:999px;background:color-mix(in srgb,var(--acc) 14%,transparent);color:var(--acc-bright)}

  /* ações do detalhe */
  .detacts{display:flex;gap:8px;flex-wrap:wrap;margin:2px 0 16px}
  .detacts button{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:600;padding:9px 13px;border-radius:11px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:#cdd6dd}
  .detacts button:hover{border-color:var(--acc);color:#fff}
  .detacts button.prim{background:var(--acc);color:var(--acc-on);border-color:transparent}

  /* avaliações */
  .reviews{border-top:1px solid var(--line);margin-top:20px;padding-top:16px}
  .reviews h5{font-family:'Sora';font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--acc-bright);margin-bottom:12px}
  .stars{display:inline-flex;gap:2px;font-size:16px}
  .stars .s{color:#3a4250}.stars.edit .s{cursor:pointer}
  .stars .s.on{color:#fbbf24}
  .ravg{display:flex;align-items:center;gap:10px;margin-bottom:14px}
  .ravg .big{font-family:'Sora';font-size:30px;font-weight:800}
  .ravg span{color:var(--mut);font-size:13px}
  .ritem{border:1px solid var(--line);border-radius:12px;padding:12px 14px;margin-bottom:10px}
  .ritem .top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .ritem .top b{font-size:13.5px}.ritem .top .when{margin-left:auto;font-size:11.5px;color:var(--mut2)}
  .ritem p{font-size:13.5px;color:#cdd6dd;line-height:1.45}
  .rform{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:13px;padding:14px;margin-bottom:16px}
  .rform .stars{font-size:26px;margin-bottom:10px}
  .rform textarea{width:100%;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:14px;padding:10px;min-height:60px;outline:none;resize:vertical;margin-bottom:10px}

  /* modo cozinhar */
  .cook{position:fixed;inset:0;z-index:250;background:var(--bg);display:none;flex-direction:column}
  .cook.on{display:flex}
  .cook .top{display:flex;align-items:center;gap:14px;padding:18px 22px;border-bottom:1px solid var(--line)}
  .cook .top b{font-family:'Sora';font-size:18px}
  .cook .top .x{margin-left:auto;width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.06);display:grid;place-items:center;font-size:18px}
  .cook .prog{height:4px;background:rgba(255,255,255,.08)}
  .cook .prog i{display:block;height:100%;background:var(--acc);transition:.3s}
  .cook .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;overflow:auto}
  .cook .step-n{font-family:'Inter';color:var(--acc-bright);font-size:13px;letter-spacing:.14em;text-transform:uppercase;font-weight:700;margin-bottom:14px}
  .cook .step-t{font-size:clamp(20px,3.2vw,32px);line-height:1.35;max-width:740px;font-weight:600}
  .cook .timer{margin-top:26px;display:flex;flex-direction:column;align-items:center;gap:12px}
  .cook .clock{font-family:'Sora';font-size:52px;font-weight:800;font-variant-numeric:tabular-nums}
  .cook .trow{display:flex;gap:10px}
  .cook .trow button{padding:11px 20px;border-radius:12px;font-weight:700;font-size:14px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:#cdd6dd}
  .cook .trow button.go{background:var(--acc);color:var(--acc-on);border-color:transparent}
  .cook .nav{display:flex;gap:12px;padding:18px 22px;border-top:1px solid var(--line)}
  .cook .nav button{flex:1;padding:14px;border-radius:13px;font-weight:700;font-size:15px;background:rgba(255,255,255,.06);border:1px solid var(--line);color:#fff}
  .cook .nav button.go{background:var(--acc);color:var(--acc-on);border-color:transparent}
  .cook .nav button:disabled{opacity:.4}

  /* lista de compras */
  .lc{display:flex;flex-direction:column;gap:8px;max-width:680px}
  .lc .li{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .lc .li.done .txt{text-decoration:line-through;color:var(--mut2)}
  .lc .li input{width:18px;height:18px;accent-color:var(--acc);flex:0 0 auto}
  .lc .li .txt{flex:1;font-size:14.5px}
  .lc .li .src{font-size:11.5px;color:var(--mut2);display:block;margin-top:2px}
  .lc .li .rm{color:#ff9a9a;font-size:16px;background:none}
  .lcbar{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap}

  /* cardápio semanal */
  .planner{display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start}
  .recpool{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:14px;position:sticky;top:20px}
  .recpool .ph{font-size:12px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut2);font-weight:700;margin-bottom:10px}
  .recpool input{width:100%;background:rgba(0,0,0,.2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:13px;padding:8px 10px;outline:none;margin-bottom:10px}
  .recpool .pool{display:flex;flex-direction:column;gap:6px;max-height:60vh;overflow:auto}
  .rchip{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line);border-radius:10px;padding:8px 10px;font-size:13px;cursor:grab;user-select:none}
  .rchip:active{cursor:grabbing}
  .week{display:grid;grid-template-columns:repeat(7,1fr);gap:10px}
  .day{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:10px;min-height:150px;display:flex;flex-direction:column;gap:8px}
  .day.over{border-color:var(--acc);background:color-mix(in srgb,var(--acc) 8%,transparent)}
  .day .dh{font-size:12px;font-weight:700;color:var(--acc-bright);text-align:center;padding-bottom:6px;border-bottom:1px solid var(--line)}
  .day .it{background:rgba(255,255,255,.06);border-radius:9px;padding:7px 8px;font-size:12px;display:flex;align-items:center;gap:6px;cursor:grab}
  .day .it .rm{margin-left:auto;color:#ff9a9a;cursor:pointer}
  .day .empty2{font-size:11.5px;color:var(--mut2);text-align:center;margin:auto 0}

  /* histórico */
  .hist{display:flex;flex-direction:column;gap:8px;max-width:680px}
  .hi{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:12px;padding:11px 14px}
  .hi .em{font-size:22px}.hi b{font-size:14.5px}.hi .when{margin-left:auto;font-size:12px;color:var(--mut2)}

  /* gráficos do admin */
  .charts{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin:6px 0 18px}
  .chart{background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:16px;padding:16px 18px}
  .chart h4{font-family:'Sora';font-size:14px;margin-bottom:14px}
  .bars{display:flex;align-items:flex-end;gap:8px;height:130px}
  .bars .b{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;height:100%;justify-content:flex-end}
  .bars .b .bar{width:100%;max-width:34px;background:linear-gradient(180deg,var(--acc),var(--acc2));border-radius:6px 6px 0 0;min-height:3px}
  .bars .b small{font-size:10px;color:var(--mut2)}
  .bars .b .v{font-size:11px;font-weight:700}
  .htop{display:flex;flex-direction:column;gap:9px}
  .htop .r{display:flex;align-items:center;gap:10px;font-size:13px}
  .htop .r .n{width:18px;color:var(--mut2);font-weight:700}
  .htop .r .nm{flex:0 0 38%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .htop .r .track{flex:1;height:8px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden}
  .htop .r .track i{display:block;height:100%;background:var(--acc)}
  .htop .r .vv{font-size:12px;color:var(--mut);font-weight:600}
  @media(max-width:900px){ .planner{grid-template-columns:1fr}.recpool{position:static}.week{grid-template-columns:repeat(2,1fr)}.charts{grid-template-columns:1fr} }

  /* ===== main ===== */
  main{flex:1;padding:26px 32px 60px;min-width:0}
  .topbar{display:flex;align-items:center;gap:16px;margin-bottom:26px;flex-wrap:wrap}
  .topbar h1{font-family:'Sora';font-weight:700;font-size:24px}
  .topbar h1 span{color:var(--acc-bright)}
  .bigsearch{margin-left:auto;display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.05);
    border:1px solid var(--line);padding:0 16px;border-radius:15px;width:300px;transition:.2s}
  .bigsearch:focus-within{border-color:color-mix(in srgb,var(--acc) 55%,transparent)}
  .bigsearch input{background:none;border:none;outline:none;color:var(--txt);font-size:14px;padding:11px 0;width:100%}
  .bigsearch input::placeholder{color:var(--mut2)}
  .iconbtn{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.05);border:1px solid var(--line);display:grid;place-items:center;font-size:16px;flex:0 0 auto}
  .addbtn{display:flex;align-items:center;gap:8px;background:var(--acc);color:var(--acc-on);padding:11px 18px;border-radius:14px;font-weight:700;font-size:14px;flex:0 0 auto}
  .addbtn:hover{filter:brightness(1.08)}

  /* feature + stats */
  .feat{display:grid;grid-template-columns:1.3fr 1fr;gap:20px;margin-bottom:30px}
  .feature{border-radius:26px;padding:34px;position:relative;overflow:hidden;
    background:radial-gradient(130% 120% at 82% 8%,#244a8f,var(--feat-b) 62%,var(--bg));
    border:1px solid color-mix(in srgb,var(--acc) 25%,transparent);display:flex;flex-direction:column;justify-content:flex-end;min-height:230px;cursor:pointer}
  .feature .g{position:absolute;right:-10px;top:-20px;font-size:170px;opacity:.22;line-height:1}
  .feature .k{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--acc-bright);font-weight:700}
  .feature h2{font-family:'Sora';font-weight:700;font-size:30px;line-height:1.05;margin:10px 0 14px;max-width:340px;color:#fff}
  .feature .go{align-self:flex-start;background:var(--acc);color:var(--acc-on);padding:11px 22px;border-radius:14px;font-weight:700;font-size:14px}
  .statwrap{display:grid;grid-template-rows:1fr 1fr;gap:20px}
  .stat{border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--line);padding:22px;display:flex;flex-direction:column;justify-content:center;gap:6px}
  .stat .n{font-family:'Sora';font-weight:800;font-size:34px;color:#fff}
  .stat .n em{color:var(--acc-bright);font-style:normal}
  .stat span{font-size:13.5px;color:var(--mut)}

  .row{display:flex;align-items:center;justify-content:space-between;margin:6px 0 18px}
  .row h3{font-family:'Sora';font-weight:700;font-size:20px}
  .row a{font-size:13.5px;color:var(--acc-bright);font-weight:600;cursor:pointer}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-bottom:34px}

  .card{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:22px;overflow:hidden;transition:.22s;cursor:pointer;position:relative}
  .card:hover{transform:translateY(-5px);border-color:color-mix(in srgb,var(--acc) 45%,transparent)}
  .card .ph{aspect-ratio:16/10;position:relative;display:grid;place-items:center;font-size:60px}
  .card .dot{position:absolute;top:11px;left:11px;background:rgba(10,12,16,.72);backdrop-filter:blur(6px);padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:700;color:var(--acc-bright)}
  .card .fav{position:absolute;top:9px;right:9px;width:33px;height:33px;border-radius:50%;background:rgba(10,12,16,.72);backdrop-filter:blur(6px);display:grid;place-items:center;font-size:15px;border:1px solid var(--line)}
  .card .fav.on{background:var(--acc);color:#fff;border-color:transparent}
  .card .body{padding:15px 16px 16px}
  .card h4{font-family:'Sora';font-weight:600;font-size:16px;margin-bottom:11px;line-height:1.2}
  .card .meta{display:flex;gap:10px;flex-wrap:wrap}
  .pchip{display:flex;align-items:center;gap:5px;background:rgba(255,255,255,.05);padding:5px 10px;border-radius:8px;font-size:12px;color:#9aa7b1;font-weight:500}

  .empty{border:1px dashed var(--line);border-radius:18px;padding:50px 24px;text-align:center;color:var(--mut)}
  .empty .ico{font-size:42px;margin-bottom:12px}
  .empty b{display:block;color:var(--txt);font-family:'Sora';font-size:17px;margin-bottom:6px}

  .card .ph img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .card .ph .emoji{position:relative;z-index:0}

  /* ===== modal (cabeçalho fixo + corpo rolável + rodapé fixo) ===== */
  .overlay{position:fixed;inset:0;background:rgba(4,6,10,.66);backdrop-filter:blur(4px);z-index:100;
    display:flex;align-items:center;justify-content:center;padding:28px 18px;overflow:auto;opacity:0;pointer-events:none;transition:.2s}
  .overlay.on{opacity:1;pointer-events:auto}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:22px;width:100%;max-width:620px;overflow:hidden;
    display:flex;flex-direction:column;max-height:calc(100vh - 56px);transform:translateY(10px);transition:.2s}
  .overlay.on .modal{transform:none}

  .mhead{position:relative;min-height:150px;display:flex;align-items:flex-end;padding:20px 24px;flex:0 0 auto;overflow:hidden}
  .mhead .himg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .mhead .hov{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.1),rgba(0,0,0,.5));z-index:1}
  .mhead .g{position:absolute;right:14px;top:50%;transform:translateY(-50%);font-size:96px;opacity:.85;z-index:2}
  .mhead .dot{background:rgba(10,12,16,.55);padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;color:#fff;position:relative;z-index:2}
  .mclose{position:absolute;top:14px;right:14px;width:34px;height:34px;border-radius:50%;background:rgba(10,12,16,.5);display:grid;place-items:center;font-size:16px;color:#fff;z-index:3}

  .mscroll{padding:22px 24px;overflow:auto;flex:1 1 auto;min-height:0}
  .mscroll h2{font-family:'Sora';font-weight:700;font-size:24px;margin-bottom:14px}
  .mmeta{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:18px}
  .mblock h5{font-family:'Sora';font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--acc-bright);margin:18px 0 10px}
  .mblock ul{list-style:none;display:flex;flex-direction:column;gap:8px}
  .mblock li{display:flex;gap:11px;font-size:14.5px;color:#cdd6dd;line-height:1.45}
  .mblock li .b{color:var(--acc);flex:0 0 auto;margin-top:1px}
  .mblock li .q{color:#fff;font-weight:600}
  .mblock ol{list-style:none;counter-reset:s;display:flex;flex-direction:column;gap:12px}
  .mblock ol li{counter-increment:s}
  .mblock ol li::before{content:counter(s);flex:0 0 26px;height:26px;border-radius:8px;background:color-mix(in srgb,var(--acc) 18%,transparent);color:var(--acc-bright);font-weight:700;font-size:13px;display:inline-grid;place-items:center}

  /* controle de porção */
  .scaler{display:flex;align-items:center;gap:12px;flex-wrap:wrap;background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:13px;padding:12px 14px;margin-bottom:4px}
  .scaler .lab{font-size:13px;font-weight:600;color:var(--mut)}
  .scaler .lab b{color:var(--acc-bright);font-weight:700}
  .scaler .steps{display:flex;gap:4px;margin-left:auto;background:rgba(0,0,0,.25);padding:4px;border-radius:10px}
  .scaler .steps button{padding:7px 12px;border-radius:8px;font-size:13px;font-weight:700;color:#9aa7b1;transition:.15s}
  .scaler .steps button:hover{color:#fff}
  .scaler .steps button.on{background:var(--acc);color:var(--acc-on)}
  .scaler .pm{display:flex;align-items:center;gap:8px}
  .scaler .pm button{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid var(--line);font-size:16px;font-weight:700;color:#fff;display:grid;place-items:center}
  .scaler .pm button:hover{border-color:var(--acc)}
  .scaler .pm .val{min-width:34px;text-align:center;font-weight:700;font-size:14px}

  .mfoot{display:flex;gap:10px;align-items:center;padding:15px 24px;border-top:1px solid var(--line);flex:0 0 auto;background:var(--panel);flex-wrap:wrap}
  .mfoot .grow{flex:1}
  .bsoft{background:rgba(255,255,255,.06);border:1px solid var(--line);padding:11px 16px;border-radius:11px;font-weight:600;font-size:14px}
  .bsoft:hover{background:rgba(255,255,255,.1)}
  .bacc{background:var(--acc);color:var(--acc-on);padding:11px 18px;border-radius:11px;font-weight:700;font-size:14px}
  .bdanger{color:#ff8a8a}.bdanger:hover{background:rgba(255,80,80,.12)}

  /* form */
  .field{margin-bottom:16px}
  .field label{display:block;font-size:13px;font-weight:600;color:var(--mut);margin-bottom:7px}
  .field input,.field select,.field textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--line);
    border-radius:11px;padding:11px 13px;color:var(--txt);font-size:14px;outline:none;transition:.18s}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:color-mix(in srgb,var(--acc) 55%,transparent)}
  .field textarea{resize:vertical;min-height:84px;line-height:1.5}
  .field .help{font-size:12px;color:var(--mut2);margin-top:6px}
  .frow{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .form-title{font-family:'Sora';font-weight:700;font-size:21px;padding:22px 24px 16px;flex:0 0 auto}
  .imgprev{margin-top:10px;border-radius:11px;overflow:hidden;border:1px solid var(--line);aspect-ratio:16/9;background:rgba(255,255,255,.03);display:none}
  .imgprev img{width:100%;height:100%;object-fit:cover}
  .imgprev.on{display:block}

  /* ---- construtor de ingredientes/passos (Modelo 1) ---- */
  .sechead{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .sechead label{font-size:13px;font-weight:600;color:var(--mut);margin:0}
  .badge{font-size:11px;color:var(--mut2);background:rgba(255,255,255,.05);padding:3px 9px;border-radius:999px;font-weight:600}
  .addline{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;
    border:1.5px dashed color-mix(in srgb,var(--acc) 45%,var(--line));border-radius:12px;padding:11px;
    color:var(--acc-bright);font-weight:600;font-size:13.5px;background:color-mix(in srgb,var(--acc) 6%,transparent);transition:.15s;margin-top:2px}
  .addline:hover{background:color-mix(in srgb,var(--acc) 12%,transparent)}
  .rmrow{width:38px;height:38px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--line);color:#ff9a9a;display:grid;place-items:center;font-size:14px;flex:0 0 auto}
  .rmrow:hover{background:rgba(255,90,90,.14)}
  .ingrow{display:grid;grid-template-columns:80px 162px 1fr 38px;gap:8px;align-items:center;margin-bottom:8px}
  .ingrow input,.ingrow select{padding:10px 11px;border-radius:10px}
  .steprow{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
  .steprow .num{flex:0 0 30px;height:30px;border-radius:9px;background:color-mix(in srgb,var(--acc) 18%,transparent);
    color:var(--acc-bright);font-weight:700;display:grid;place-items:center;font-size:13px;margin-top:4px}
  .steprow textarea{min-height:52px}

  /* toast */
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--panel);
    border:1px solid color-mix(in srgb,var(--acc) 40%,transparent);padding:13px 20px;border-radius:13px;font-size:14px;font-weight:600;
    z-index:200;opacity:0;pointer-events:none;transition:.25s;box-shadow:0 20px 50px -20px #000}
  .toast.on{opacity:1;transform:translateX(-50%)}

  /* ===== componentes mobile (ocultos no desktop) ===== */
  .mtop{display:none}
  .botnav{display:none}
  .scrim{display:none}

  @media(max-width:900px){
    /* barra superior do app */
    .mtop{display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:60;
      padding:11px 16px;background:rgba(8,11,18,.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
    .mtop .burger{width:42px;height:42px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid var(--line);display:grid;place-items:center;font-size:18px}
    .mtop .blogo{font-family:'Sora';font-weight:800;font-size:18px;display:flex;align-items:center;gap:8px}
    .mtop .blogo .sq{width:28px;height:28px;border-radius:9px;background:var(--acc);color:var(--acc-on);display:grid;place-items:center;font-size:15px}
    .mtop .mav{margin-left:auto;width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));display:grid;place-items:center;font-weight:700;color:var(--acc-on);font-size:14px}

    .shell{display:block;max-width:100%}
    /* menu lateral vira gaveta deslizante */
    aside{position:fixed;top:0;left:0;height:100dvh;width:284px;max-width:86vw;margin:0;border-radius:0 24px 24px 0;
      transform:translateX(-102%);transition:transform .26s ease;z-index:120;box-shadow:0 30px 80px -20px #000;
      background:#0e1219}
    aside.open{transform:none}
    .scrim{display:block;position:fixed;inset:0;background:rgba(4,6,10,.6);backdrop-filter:blur(2px);z-index:110;opacity:0;pointer-events:none;transition:.25s}
    .scrim.on{opacity:1;pointer-events:auto}

    main{padding:18px 16px 100px}
    .topbar{gap:12px;margin-bottom:18px}
    .topbar h1{font-size:20px;width:100%;order:1}
    .bigsearch{width:100%;order:2;margin-left:0}
    /* "Nova receita" vira botão flutuante */
    #btnAdd{position:fixed;right:16px;bottom:86px;z-index:90;border-radius:999px;padding:14px 18px;box-shadow:0 16px 36px -12px var(--acc)}

    /* navegação inferior */
    .botnav{display:flex;position:fixed;left:0;right:0;bottom:0;z-index:100;
      background:rgba(10,13,20,.95);backdrop-filter:blur(14px);border-top:1px solid var(--line);
      padding:8px 6px calc(8px + env(safe-area-inset-bottom));justify-content:space-around}
    .botnav button{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;color:var(--mut2);flex:1;padding:5px 2px;border-radius:12px}
    .botnav button span{font-size:20px;line-height:1}
    .botnav button.on{color:var(--acc-bright)}

    .feat{grid-template-columns:1fr;gap:14px}
    .feature{min-height:180px;padding:26px}
    .feature h2{font-size:26px}
    .grid{grid-template-columns:repeat(2,1fr);gap:14px}
    .row h3,.rowh h3{font-size:18px}

    /* modais como folha inferior (bottom sheet) */
    .overlay{padding:0;align-items:flex-end}
    .modal{max-width:100%;max-height:94dvh;border-radius:24px 24px 0 0}

    /* admin compacto */
    .adminhead{gap:10px}
    .adminhead .kpi{width:100%;display:grid;grid-template-columns:repeat(2,1fr)}
    .kpi .box{min-width:0}
    .charts{grid-template-columns:1fr}
    .planner{grid-template-columns:1fr}.recpool{position:static}.week{grid-template-columns:repeat(2,1fr)}
    .filtros{gap:8px}.filtros select{flex:1}
  }
  @media(max-width:560px){
    .grid{grid-template-columns:1fr;gap:14px}
    .frow{grid-template-columns:1fr}
    .statwrap{grid-template-rows:auto auto}
    .feature h2{font-size:24px}
    .week{grid-template-columns:1fr}
    .detacts button{flex:1;justify-content:center}
    /* construtor de ingredientes em coluna */
    .ingrow{grid-template-columns:70px 1fr 36px;grid-template-areas:'q n x' 'u n x';gap:7px}
    .ingrow .f-q{grid-area:q}.ingrow .f-u{grid-area:u}.ingrow .f-n{grid-area:n;align-self:stretch}.ingrow .rmrow{grid-area:x;align-self:center}
    .ingrow .f-n{height:100%}
  }
</style>
</head>
<body>
<header class="mtop">
  <button class="burger" id="mBurger" aria-label="Abrir menu">☰</button>
  <div class="blogo"><span class="sq">🔪</span>Mise</div>
  <button class="mav" id="mAvatar" aria-label="Menu da conta">F</button>
</header>
<div class="shell">
  <aside id="sidebar"></aside>
  <main>
    <div class="topbar">
      <h1 id="pageTitle">Olá, Maria 👋 <span>o que vamos cozinhar?</span></h1>
      <div class="bigsearch"><span>🔍</span><input id="search" placeholder="Buscar por nome ou ingrediente…" autocomplete="off"></div>
      <button class="addbtn" id="btnAdd">＋ Nova receita</button>
    </div>
    <div id="content"></div>
  </main>
</div>

<nav class="botnav" id="botnav">
  <button data-nav="inicio"><span>🏠</span>Início</button>
  <button data-nav="populares"><span>🔥</span>Populares</button>
  <button data-nav="salvas"><span>🔖</span>Salvas</button>
  <button data-nav="cardapio"><span>📅</span>Cardápio</button>
  <button id="bnMenu"><span>☰</span>Menu</button>
</nav>
<div class="scrim" id="scrim"></div>

<div class="overlay" id="overlay"></div>
<div class="toast" id="toast"></div>
<div class="authgate" id="authgate"></div>

<!-- =====================================================================
     CAMADA DE ARMAZENAMENTO (storage abstraction)
     ---------------------------------------------------------------------
     O app inteiro fala SÓ com a interface `RecipeStore`.
     Hoje rodamos com `IndexedDBStore`. Para migrar pro Firestore no futuro,
     veja o arquivo  firestore-store.js  e troque a linha marcada com
     [TROCAR AQUI] lá embaixo. Nada mais no app precisa mudar.
===================================================================== -->
<script>
/* ---- Interface comum (contrato) ---- */
class RecipeStore {
  async init() {}
  async seedIfEmpty(/*cats, recipes, users*/) {}
  async getCategories() {}                 // -> [{slug,nome,emoji,grad}]
  async getRecipes({categoria, busca, favoritas} = {}) {} // -> [receita]
  async getRecipe(id) {}                    // -> receita | null
  async saveRecipe(receita) {}              // cria (sem id) ou atualiza (com id) -> receita
  async deleteRecipe(id) {}
  async toggleFavorite(id) {}               // -> bool novo estado
  async stats() {}                          // -> {total, tempoMedio}
  // --- usuários / sessão (mapeiam para Firebase Auth + coleção "usuarios") ---
  async getUsers() {}                       // -> [usuario]
  async getUser(id) {}                      // -> usuario | null
  async saveUser(usuario) {}                // cria/atualiza -> usuario
  async deleteUser(id) {}
  async getMeta(k) {}                       // valor de configuração (ex.: sessão)
  async setMeta(k, v) {}

/* ---- Implementação IndexedDB (em uso hoje) ---- */
class IndexedDBStore extends RecipeStore {
  constructor(){ super(); this.db=null; this.NAME='mise_receitas'; this.VER=3; }
  init(){
    return new Promise((res,rej)=>{
      const req=indexedDB.open(this.NAME,this.VER);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('categorias')) db.createObjectStore('categorias',{keyPath:'slug'});
        if(!db.objectStoreNames.contains('receitas')){
          const s=db.createObjectStore('receitas',{keyPath:'id'});
          s.createIndex('categoria','categoria',{unique:false});
        }
        if(!db.objectStoreNames.contains('usuarios')) db.createObjectStore('usuarios',{keyPath:'id'});
        if(!db.objectStoreNames.contains('meta')) db.createObjectStore('meta',{keyPath:'k'});
        if(!db.objectStoreNames.contains('avaliacoes')) db.createObjectStore('avaliacoes',{keyPath:'id'});
        if(!db.objectStoreNames.contains('userdata')) db.createObjectStore('userdata',{keyPath:'uid'});
      };
      req.onsuccess=e=>{this.db=e.target.result;res();};
      req.onerror=e=>rej(e.target.error);
    });
  }
  _tx(store,mode='readonly'){ return this.db.transaction(store,mode).objectStore(store); }
  _all(store){ return new Promise((res,rej)=>{const r=this._tx(store).getAll();r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);}); }
  _put(store,val){ return new Promise((res,rej)=>{const r=this._tx(store,'readwrite').put(val);r.onsuccess=()=>res(val);r.onerror=()=>rej(r.error);}); }
  _get(store,key){ return new Promise((res,rej)=>{const r=this._tx(store).get(key);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);}); }
  _del(store,key){ return new Promise((res,rej)=>{const r=this._tx(store,'readwrite').delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); }

  async seedIfEmpty(cats,recipes,users){
    const existing=await this._all('receitas');
    if(!existing.length){
      for(const c of cats) await this._put('categorias',c);
      for(const r of recipes) await this._put('receitas',r);
    }
    if(users && !(await this._all('usuarios')).length){
      for(const u of users) await this._put('usuarios',u);
    }
  }
  async getCategories(){ return (await this._all('categorias')).sort((a,b)=>a.ordem-b.ordem); }
  async getRecipes({categoria,busca,favoritas}={}){
    let list=await this._all('receitas');
    if(categoria) list=list.filter(r=>r.categoria===categoria);
    if(favoritas) list=list.filter(r=>r.favorito);
    if(busca){
      const q=busca.toLowerCase();
      list=list.filter(r=>r.titulo.toLowerCase().includes(q) ||
        (r.ingredientes||[]).some(i=>i.toLowerCase().includes(q)));
    }
    return list.sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));
  }
  async getRecipe(id){ return new Promise((res,rej)=>{const r=this._tx('receitas').get(id);r.onsuccess=()=>res(r.result||null);r.onerror=()=>rej(r.error);}); }
  async saveRecipe(rec){
    if(!rec.id){ rec.id=(crypto.randomUUID?crypto.randomUUID():'r'+Date.now()+Math.random().toString(16).slice(2)); rec.criadoEm=Date.now(); }
    return this._put('receitas',rec);
  }
  async deleteRecipe(id){ return new Promise((res,rej)=>{const r=this._tx('receitas','readwrite').delete(id);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);}); }
  async toggleFavorite(id){ const r=await this.getRecipe(id); r.favorito=!r.favorito; await this._put('receitas',r); return r.favorito; }
  async stats(){ const l=await this._all('receitas'); const t=l.reduce((s,r)=>s+(+r.tempoMin||0),0); return {total:l.length,tempoMedio:l.length?Math.round(t/l.length):0}; }
  async getUsers(){ return (await this._all('usuarios')).sort((a,b)=>(a.criadoEm||0)-(b.criadoEm||0)); }
  async getUser(id){ return this._get('usuarios',id); }
  async saveUser(u){ if(!u.id){ u.id='u'+Date.now()+Math.random().toString(16).slice(2); u.criadoEm=Date.now(); } return this._put('usuarios',u); }
  async deleteUser(id){ return this._del('usuarios',id); }
  async getMeta(k){ const r=await this._get('meta',k); return r?r.v:null; }
  async setMeta(k,v){ return this._put('meta',{k,v}); }
  async getReviews(receitaId){ return (await this._all('avaliacoes')).filter(a=>a.receitaId===receitaId).sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0)); }
  async getAllReviews(){ return this._all('avaliacoes'); }
  async addOrUpdateReview(av){
    const todas=await this._all('avaliacoes');
    const ex=todas.find(a=>a.receitaId===av.receitaId && a.autorId===av.autorId);
    if(ex){ av.id=ex.id; av.criadoEm=ex.criadoEm; } else { av.id='av'+Date.now()+Math.random().toString(16).slice(2); av.criadoEm=Date.now(); }
    return this._put('avaliacoes',av);
  }
  async incView(id){ const r=await this.getRecipe(id); if(!r)return; r.views=(r.views||0)+1; await this._put('receitas',r); }
  async getUserData(uid){ const d=await this._get('userdata',uid); return d?d.data:{}; }
  async saveUserData(uid,data){ return this._put('userdata',{uid,data}); }
}

/* ---- Fallback em memória (se o navegador bloquear IndexedDB, ex: preview) ---- */
class MemoryStore extends RecipeStore {
  constructor(){ super(); this.cats=[]; this.recs=[]; this.users=[]; this.meta={}; this.reviews=[]; this.udata={}; }
  async init(){}
  async seedIfEmpty(cats,recipes,users){
    if(!this.recs.length){ this.cats=[...cats]; this.recs=recipes.map(r=>({...r})); }
    if(users && !this.users.length){ this.users=users.map(u=>({...u})); }
  }
  async getCategories(){ return [...this.cats].sort((a,b)=>a.ordem-b.ordem); }
  async getRecipes({categoria,busca,favoritas}={}){
    let l=[...this.recs];
    if(categoria) l=l.filter(r=>r.categoria===categoria);
    if(favoritas) l=l.filter(r=>r.favorito);
    if(busca){const q=busca.toLowerCase();l=l.filter(r=>r.titulo.toLowerCase().includes(q)||(r.ingredientes||[]).some(i=>i.toLowerCase().includes(q)));}
    return l.sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0));
  }
  async getRecipe(id){ return this.recs.find(r=>r.id===id)||null; }
  async saveRecipe(rec){
    if(!rec.id){ rec.id='r'+Date.now()+Math.random().toString(16).slice(2); rec.criadoEm=Date.now(); this.recs.push(rec); }
    else { const i=this.recs.findIndex(r=>r.id===rec.id); if(i>=0) this.recs[i]=rec; }
    return rec;
  }
  async deleteRecipe(id){ this.recs=this.recs.filter(r=>r.id!==id); }
  async toggleFavorite(id){ const r=await this.getRecipe(id); r.favorito=!r.favorito; return r.favorito; }
  async stats(){ const t=this.recs.reduce((s,r)=>s+(+r.tempoMin||0),0); return {total:this.recs.length,tempoMedio:this.recs.length?Math.round(t/this.recs.length):0}; }
  async getUsers(){ return [...this.users].sort((a,b)=>(a.criadoEm||0)-(b.criadoEm||0)); }
  async getUser(id){ return this.users.find(u=>u.id===id)||null; }
  async saveUser(u){
    if(!u.id){ u.id='u'+Date.now()+Math.random().toString(16).slice(2); u.criadoEm=Date.now(); this.users.push(u); }
    else { const i=this.users.findIndex(x=>x.id===u.id); if(i>=0) this.users[i]=u; }
    return u;
  }
  async deleteUser(id){ this.users=this.users.filter(u=>u.id!==id); }
  async getMeta(k){ return k in this.meta?this.meta[k]:null; }
  async setMeta(k,v){ this.meta[k]=v; }
  async getReviews(rid){ return (this.reviews||[]).filter(a=>a.receitaId===rid).sort((a,b)=>(b.criadoEm||0)-(a.criadoEm||0)); }
  async getAllReviews(){ return [...(this.reviews||[])]; }
  async addOrUpdateReview(av){ this.reviews=this.reviews||[]; const ex=this.reviews.find(a=>a.receitaId===av.receitaId&&a.autorId===av.autorId);
    if(ex){ Object.assign(ex,av); return ex; } av.id='av'+Date.now()+Math.random().toString(16).slice(2); av.criadoEm=Date.now(); this.reviews.push(av); return av; }
  async incView(id){ const r=await this.getRecipe(id); if(r) r.views=(r.views||0)+1; }
  async getUserData(uid){ return (this.udata&&this.udata[uid])||{}; }
  async saveUserData(uid,data){ this.udata=this.udata||{}; this.udata[uid]=data; }
}

/* =====================================================================
   CAMADA DE AUTENTICAÇÃO (auth abstraction)
   ---------------------------------------------------------------------
   Login NÃO é Firestore — é o Firebase Authentication. Aqui usamos uma
   versão local (LocalAuth) que valida contra a coleção "usuarios". Para
   migrar, troque por FirebaseAuthProvider (veja firestore-store.js) — a
   interface (login, signup, logout, current) é a mesma.
===================================================================== -->
class AuthProvider {
  async current() {}                  // -> usuario logado | null
  async login(email, senha) {}        // -> usuario | lança erro
  async signup({nome,email,senha}) {} // -> usuario | lança erro
  async logout() {}
  async resetPassword(email) {}       // envia redefinição (Firebase) ou avisa (local)
}
class LocalAuth extends AuthProvider {
  constructor(store){ super(); this.store=store; }
  async current(){ const id=await this.store.getMeta('sessao'); return id?await this.store.getUser(id):null; }
  async login(email,senha){
    const u=(await this.store.getUsers()).find(x=>(x.email||'').toLowerCase()===email.trim().toLowerCase());
    if(!u) throw new Error('E-mail não encontrado.');
    if((u.senha||'')!==senha) throw new Error('Senha incorreta.');
    await this.store.setMeta('sessao',u.id); return u;
  }
  async signup({nome,email,senha}){
    email=email.trim();
    if(!nome||!email||!senha) throw new Error('Preencha nome, e-mail e senha.');
    if(senha.length<6) throw new Error('A senha precisa de pelo menos 6 caracteres.');
    if((await this.store.getUsers()).some(x=>(x.email||'').toLowerCase()===email.toLowerCase()))
      throw new Error('Este e-mail já está cadastrado.');
    const u=await this.store.saveUser({nome:nome.trim(),email,senha,role:'user',status:'ativo',planoAte:null});
    await this.store.setMeta('sessao',u.id); return u;
  }
  async logout(){ await this.store.setMeta('sessao',null); }
  async resetPassword(email){
    // modo local não tem e-mail; só confirma se a conta existe
    const u=(await this.store.getUsers()).find(x=>(x.email||'').toLowerCase()===email.trim().toLowerCase());
    if(!u) throw new Error('E-mail não encontrado.');
    throw new Error('No modo local não há envio de e-mail. Com o Firebase, o link de redefinição é enviado de verdade.');
  }
}

function aggregaReviews(arr){
  const m={};
  for(const a of arr){ (m[a.receitaId]=m[a.receitaId]||[]).push(+a.nota||0); }
  const out={}; for(const k in m){ const v=m[k]; out[k]={n:v.length, media:Math.round(v.reduce((s,x)=>s+x,0)/v.length*10)/10}; }
  return out;
}
function mediaReceita(r){ const s=reviewStats[r.id]; return s? s.media : (r.rating ?? null); }
function nReviews(r){ return reviewStats[r.id]?.n || 0; }

// detecta duração no texto do passo: "asse por 40 min", "1h", "30 segundos"
function duracaoPasso(txt){
  const m=String(txt).match(/(\d+(?:[.,]\d+)?)\s*(h|hora|horas|min|minuto|minutos|seg|segundo|segundos)/i);
  if(!m) return 0;
  const n=parseFloat(m[1].replace(',','.')); const u=m[2].toLowerCase();
  if(u[0]==='h') return Math.round(n*3600);
  if(u.startsWith('seg')) return Math.round(n);
  return Math.round(n*60);
}
function fmtTimer(s){ const m=Math.floor(s/60), x=s%60; return `${String(m).padStart(2,'0')}:${String(x).padStart(2,'0')}`; }

function aplicaFiltros(list){
  let l=[...list];
  if(fDif) l=l.filter(r=>(r.dificuldade||'')===fDif);
  if(fTags.size) l=l.filter(r=>{ const t=r.tags||[]; for(const tg of fTags) if(!t.includes(tg)) return false; return true; });
  const ord={
    recentes:(a,b)=>(b.criadoEm||0)-(a.criadoEm||0),
    avaliadas:(a,b)=>(mediaReceita(b)||0)-(mediaReceita(a)||0),
    rapidas:(a,b)=>(a.tempoMin||0)-(b.tempoMin||0),
    longas:(a,b)=>(b.tempoMin||0)-(a.tempoMin||0),
    az:(a,b)=>(a.titulo||'').localeCompare(b.titulo||''),
  }[fOrdenar];
  if(ord) l.sort(ord);
  return l;
}

async function boot(){

  const firebase = !!(window.FirestoreStore && window.FirebaseAuthProvider);
  window.MODO_FIREBASE = firebase;
  try{
    if(firebase){

      auth =new window.FirebaseAuthProvider(store);
    }else{
      try{ store=new IndexedDBStore(); await store.init(); }
      catch(e){ console.warn('IndexedDB indisponível, usando memória:',e); store=new MemoryStore(); }
      auth =new LocalAuth(store);
    }
  }catch(e){ console.error('Falha ao iniciar o armazenamento:',e); }
  // seed: no Firebase, semeia só categorias/receitas (usuários vêm do Auth)
  try{ await store.seedIfEmpty(SEED_CATS,SEED_RECIPES, firebase?undefined:SEED_USERS); }

}

function traduzErroAuth(err){
  const c=(err&&err.code)||'';
  const map={
    'auth/invalid-email':'E-mail inválido.',
    'auth/invalid-credential':'E-mail ou senha incorretos.',
    'auth/wrong-password':'E-mail ou senha incorretos.',
    'auth/user-not-found':'E-mail ou senha incorretos.',
    'auth/email-already-in-use':'Este e-mail já está cadastrado.',
    'auth/weak-password':'A senha precisa de pelo menos 6 caracteres.',
    'auth/operation-not-allowed':'Ative o login por E-mail/senha no Firebase Authentication.',
    'auth/network-request-failed':'Falha de conexão. Verifique sua internet.',
    'auth/too-many-requests':'Muitas tentativas. Tente novamente em instantes.',
    'auth/missing-email':'Informe um e-mail.',
  };
  return map[c] || (err&&err.message) || 'Algo deu errado. Tente novamente.';
}

/* ---------- helpers de medida / escala ---------- */
function fmtQtd(n){
  const r=Math.round(n*100)/100;
  let s=Number.isInteger(r)?String(r):r.toFixed(2).replace(/0+$/,'').replace(/\.$/,'');
  return s.replace('.',',');
}
// separa "500g de farinha" -> {qtd:"500", gap:"", resto:"g de farinha"}
function partesIngrediente(linha){
  const m=String(linha).match(/^\s*(\d+(?:[.,]\d+)?(?:\/\d+)?)(\s*)(.*)$/);
  if(!m) return null;
  return {raw:m[1],gap:m[2],resto:m[3]};
}
function valorNum(raw){
  if(raw.includes('/')){const[a,b]=raw.split('/');return parseFloat(a)/parseFloat(b);}
  return parseFloat(raw.replace(',','.'));
}
// devolve {qtdHTML, texto} já escalado pelo fator
function escalaIngrediente(linha,fator){
  const p=partesIngrediente(linha);
  if(!p||fator===1){
    if(p) return {qtd:`${p.raw}${p.gap}`,resto:p.resto};
    return {qtd:'',resto:String(linha)};
  }
  const v=valorNum(p.raw);
  if(!isFinite(v)) return {qtd:`${p.raw}${p.gap}`,resto:p.resto};
  return {qtd:fmtQtd(v*fator)+(p.gap||(/^[a-zA-Zà-ú]/.test(p.resto)?'':' ')),resto:p.resto};
}
function escalaPorcoes(texto,fator){
  if(!texto) return '';
  if(fator===1) return texto;
  const m=String(texto).match(/^\s*(\d+(?:[.,]\d+)?)(\s*)(.*)$/);
  if(!m) return `${texto} (×${fmtQtd(fator)})`;
  return fmtQtd(valorNum(m[1])*fator)+m[2]+m[3];
}

}

  const info=content.querySelector('#selInfo'); if(info) info.textContent=`${selSet.size} selecionada(s)`;
  let bar=document.getElementById('selbar');
  if(selModo && selSet.size){
    if(!bar){
      bar=el(`<div class="selbar" id="selbar"><span id="selN"></span><button class="bacc" id="selDel">🗑 Excluir selecionadas</button></div>`);
      document.body.appendChild(bar);
      bar.querySelector('#selDel').onclick=excluirSelecionadas;
    }
    bar.querySelector('#selN').textContent=`${selSet.size} selecionada(s)`;
    bar.classList.add('on');
  } else if(bar){ bar.classList.remove('on'); }
}
async function excluirSelecionadas(){
  if(!selSet.size) return;
  if(!confirm(`Excluir ${selSet.size} receita(s)? Esta ação não pode ser desfeita.`)) return;
  const n=selSet.size;
  for(const id of [...selSet]){ try{ await store.deleteRecipe(id); }catch(e){ console.warn('falha ao excluir',id,e); } }
  resetSel(); toast(`${n} receita(s) excluída(s)`); renderSidebar(); render();
}

async function render(){

  if(view.tipo==='admin'){ return renderAdmin(content); }
  if(view.tipo==='lista'){ return renderLista(content); }
  if(view.tipo==='cardapio'){ return renderCardapio(content); }
  if(view.tipo==='historico'){ return renderHistorico(content); }

  const banner=bannerHTML();

  // busca tem prioridade
  if(termo){
    const res=await store.getRecipes({busca:termo});
    content.innerHTML=banner+`<div class="row"><h3>Resultados para “${esc(termo)}”</h3><a id="clr">limpar</a></div>
      ${selToolbarHTML()}
      ${res.length?gradeHTML(res):emptyHTML('Nada encontrado','Tente outro nome ou ingrediente.')}`;
    $('#clr').onclick=()=>{termo='';resetSel();$('#search').value='';render();};
    ligaGrade(content); return;
  }

  if(view.tipo==='inicio'){
    const st=await store.stats();
    const todas=await store.getRecipes();
    const destaque=todas.find(r=>r.id==='s3')||todas[0];
    const c=destaque?catBy(destaque.categoria):null;
    let html=banner+`<div class="feat">
      <div class="feature" ${destaque?`data-open="${destaque.id}"`:''} style="${destaque&&destaque.imagem?`background:linear-gradient(180deg,rgba(8,11,18,.15),rgba(8,11,18,.78)),url('${esc(destaque.imagem)}') center/cover`:`background:radial-gradient(130% 120% at 80% 10%,var(--feat-a),var(--feat-b) 60%,var(--bg))`}">
        <div class="g">${destaque&&!destaque.imagem?destaque.emoji:(destaque?'':'🍲')}</div>
        <span class="k">Receita do dia</span>
        <h2>${destaque?esc(destaque.titulo):'Comece adicionando receitas'}</h2>
        ${destaque?`<span class="go">Ver receita →</span>`:''}
      </div>
      <div class="statwrap">
        <div class="stat"><div class="n"><em>${st.total}</em></div><span>receitas disponíveis</span></div>
        <div class="stat"><div class="n">⏱️ <em>${st.tempoMedio}</em>min</div><span>tempo médio de preparo</span></div>
      </div></div>`;
    // seções por categoria (com itens)
    for(const cat of CATS){
      const items=(await store.getRecipes({categoria:cat.slug})).slice(0,3);
      if(!items.length) continue;
      html+=`<div class="row"><h3>${cat.emoji} ${cat.nome}</h3><a data-go="${cat.slug}">Ver todas →</a></div>
        <div class="grid">${items.map(cardHTML).join('')}</div>`;
    }
    content.innerHTML=html;
    content.querySelectorAll('[data-go]').forEach(a=>a.onclick=()=>{resetSel();view={tipo:'categoria',slug:a.dataset.go};renderSidebar();render();});
    const f=content.querySelector('.feature[data-open]'); if(f) f.onclick=()=>openRecipe(f.dataset.open);
    bindCards(content); return;
  }

  // listas (categoria / populares / salvas)
  let list;
  if(view.tipo==='categoria') list=await store.getRecipes({categoria:view.slug});
  else if(view.tipo==='salvas') list=await store.getRecipes({favoritas:true});
  else list=await store.getRecipes();
  if(view.tipo==='populares' && fOrdenar==='recentes') list.sort((a,b)=>(mediaReceita(b)||0)-(mediaReceita(a)||0));
  const listaFiltrada=aplicaFiltros(list);

  if(!list.length){
    content.innerHTML = banner + (view.tipo==='salvas'

    return;

    +(listaFiltrada.length?gradeHTML(listaFiltrada):emptyHTML('Nada com esses filtros','Ajuste a ordenação, dificuldade ou tags acima.'));

}

/* ---------- barra de filtros/ordenação ---------- */
function filtrosHTML(){

function ligaFiltros(content){
  const o=content.querySelector('#fOrd'); if(o)o.onchange=()=>{fOrdenar=o.value;render();};

  content.querySelectorAll('[data-tag]').forEach(b=>b.onclick=()=>{ const s=b.dataset.tag; fTags.has(s)?fTags.delete(s):fTags.add(s); render(); });
}

/* ---------- planejador de cardápio (arrastar) ---------- */
async function renderCardapio(content){
  const todas=await store.getRecipes();
  userData.cardapio=userData.cardapio||{};
  const card=userData.cardapio;
  const chip=r=>`<div class="rchip" draggable="true" data-rid="${r.id}">${r.emoji||catBy(r.categoria).emoji} ${esc(r.titulo)}</div>`;
  const dayHTML=([k,nome])=>{
    const its=card[k]||[];
    return `<div class="day" data-day="${k}">
      <div class="dh">${nome}</div>
      ${its.length?its.map((it,i)=>`<div class="it" draggable="true" data-day="${k}" data-i="${i}" data-rid="${it.id}">${it.emoji||'🍽️'} ${esc(it.titulo)}<span class="rm" data-rmday="${k}" data-rmi="${i}">✕</span></div>`).join(''):`<div class="empty2">arraste aqui</div>`}
    </div>`;
  };
  content.innerHTML=`<div class="planner">
    <div class="recpool">
      <div class="ph">Receitas</div>
      <input id="poolSearch" placeholder="filtrar…">
      <div class="pool" id="pool">${todas.map(chip).join('')}</div>
    </div>
    <div class="week">${DIAS.map(dayHTML).join('')}</div>
  </div>`;

  // filtro do pool
  $('#poolSearch').oninput=e=>{ const q=e.target.value.toLowerCase(); $('#pool').innerHTML=todas.filter(r=>r.titulo.toLowerCase().includes(q)).map(chip).join(''); ligaArraste(); };

  let dragInfo=null; // {rid, fromDay, fromIdx}
  const ligaArraste=()=>{
    content.querySelectorAll('.rchip').forEach(c=>c.ondragstart=e=>{ dragInfo={rid:c.dataset.rid,from:null}; e.dataTransfer.effectAllowed='copy'; });
    content.querySelectorAll('.day .it').forEach(c=>c.ondragstart=e=>{ e.stopPropagation(); dragInfo={rid:c.dataset.rid,from:c.dataset.day,idx:+c.dataset.i}; e.dataTransfer.effectAllowed='move'; });
  };
  const salvarERe=async()=>{ await salvaUserData(); renderCardapio(content); };
  content.querySelectorAll('.day').forEach(d=>{
    d.ondragover=e=>{ e.preventDefault(); d.classList.add('over'); };
    d.ondragleave=()=>d.classList.remove('over');
    d.ondrop=async e=>{ e.preventDefault(); d.classList.remove('over');
      const dia=d.dataset.day; if(!dragInfo)return;
      const r=todas.find(x=>x.id===dragInfo.rid); if(!r)return;
      if(dragInfo.from){ // mover de outro dia
        const arr=card[dragInfo.from]||[]; arr.splice(dragInfo.idx,1); card[dragInfo.from]=arr;
      }
      card[dia]=[...(card[dia]||[]), {id:r.id,titulo:r.titulo,emoji:r.emoji||catBy(r.categoria).emoji}];
      dragInfo=null; await salvarERe();
    };
  });
  content.querySelectorAll('[data-rmday]').forEach(b=>b.onclick=async()=>{ const k=b.dataset.rmday; (card[k]||[]).splice(+b.dataset.rmi,1); await salvarERe(); });
  ligaArraste();
}
function emptyHTML(t,s){return `<div class="empty"><div class="ico">🍳</div><b>${t}</b>${s}</div>`;}

/* ---------- estatísticas do admin ---------- */
async function montaGraficos(){
  const box=document.getElementById('charts'); if(!box) return;
  // novos usuários por mês (últimos 6)
  const meses=[]; const agora=new Date();
  for(let i=5;i>=0;i--){ const d=new Date(agora.getFullYear(),agora.getMonth()-i,1); meses.push({k:`${d.getFullYear()}-${d.getMonth()}`, lbl:d.toLocaleDateString('pt-BR',{month:'short'}), n:0}); }
  USERS.forEach(u=>{ if(!u.criadoEm)return; const d=new Date(u.criadoEm); const k=`${d.getFullYear()}-${d.getMonth()}`; const m=meses.find(x=>x.k===k); if(m)m.n++; });
  const maxU=Math.max(1,...meses.map(m=>m.n));
  // receitas mais vistas
  let recs=[]; try{ recs=await store.getRecipes(); }catch(e){ recs=[]; }
  const top=[...recs].sort((a,b)=>(b.views||0)-(a.views||0)).slice(0,5);
  const maxV=Math.max(1,...top.map(r=>r.views||0));
  box.innerHTML=`
    <div class="chart">
      <h4>Novos usuários por mês</h4>
      <div class="bars">${meses.map(m=>`<div class="b"><div class="v">${m.n}</div><div class="bar" style="height:${Math.round((m.n/maxU)*100)}%"></div><small>${m.lbl}</small></div>`).join('')}</div>
    </div>
    <div class="chart">
      <h4>Receitas mais vistas</h4>
      <div class="htop">${top.length?top.map((r,i)=>`<div class="r"><span class="n">${i+1}</span><span class="nm">${esc(r.titulo)}</span><span class="track"><i style="width:${Math.round(((r.views||0)/maxV)*100)}%"></i></span><span class="vv">${r.views||0}</span></div>`).join(''):'<div style="color:var(--mut2);font-size:13px">Ainda sem visualizações.</div>'}</div>
    </div>`;
}
function exportarUsuariosCSV(){
  const esc2=s=>`"${String(s??'').replace(/"/g,'""')}"`;
  const linhas=[['Nome','E-mail','Papel','Situação','Acesso','Criado em']];
  USERS.forEach(u=>linhas.push([u.nome,u.email,(u.role==='admin'?'Administrador':'Usuário'),(u.status==='suspenso'?'Suspenso':'Ativo'),acessoTexto(u),(u.criadoEm?new Date(u.criadoEm).toLocaleDateString('pt-BR'):'')]));
  const csv='\ufeff'+linhas.map(l=>l.map(esc2).join(';')).join('\r\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`usuarios-mise-${new Date().toISOString().slice(0,10)}.csv`;
  document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(a.href);
  toast('CSV exportado ⬇️');
}

async function acaoMassaUsuarios(tipo){
  if(!selUserSet.size) return;
  const ids=[...selUserSet];
  if(tipo==='excluir'){
    if(!confirm(`Excluir ${ids.length} usuário(s)? Esta ação não pode ser desfeita.`)) return;
    for(const id of ids){ if(usuario && id===usuario.id) continue; try{ await store.deleteUser(id); }catch(e){ console.warn(e); } }
    toast(`${ids.length} usuário(s) excluído(s)`);
  } else if(tipo==='suspender'){
    for(const id of ids){ const u=await store.getUser(id); if(!u||u.role==='admin')continue; u.status='suspenso'; try{ await store.saveUser(u); }catch(e){ console.warn(e); } }
    toast('Usuários suspensos (admins ignorados)');
  }
  selUserSet.clear(); const b=document.getElementById('ubar'); if(b) b.classList.remove('on');
  await refreshSessao(); renderSidebar(); renderAdmin($('#content'));
}

async function acaoAdmin(act,id,btn){
  if(act==='mais'){
    const pop=document.querySelector(`[data-pop="${id}"]`);
    document.querySelectorAll('.pop.on').forEach(p=>{if(p!==pop)p.classList.remove('on');});
    pop.classList.toggle('on'); return;
  }
  const u=await store.getUser(id); if(!u)return;
  if(act==='editar'){ openUserEdit(u); return; }
  if(act==='reset'){
    if(!u.email){ toast('Usuário sem e-mail cadastrado'); return; }
    try{ await auth.resetPassword(u.email); toast('Link de redefinição enviado para '+u.email); }
    catch(e){ toast(traduzErroAuth(e)); }
    return;
  }
  const base=Math.max(Date.now(), u.planoAte||0);
  if(act==='suspender'){ u.status='suspenso'; await store.saveUser(u); toast('Usuário suspenso'); }
  else if(act==='reativar'){ u.status='ativo'; await store.saveUser(u); toast('Acesso reativado'); }
  else if(act==='+7'){ u.status='ativo'; u.vitalicio=false; u.planoAte=base+7*86400000; await store.saveUser(u); toast('+7 dias de acesso'); }
  else if(act==='+30'){ u.status='ativo'; u.vitalicio=false; u.planoAte=base+30*86400000; await store.saveUser(u); toast('+30 dias de acesso'); }
  else if(act==='+90'){ u.status='ativo'; u.vitalicio=false; u.planoAte=base+90*86400000; await store.saveUser(u); toast('+90 dias de acesso'); }
  else if(act==='vitalicio'){ u.status='ativo'; u.vitalicio=true; u.planoAte=null; await store.saveUser(u); toast('Acesso indeterminado concedido ∞'); }
  else if(act==='remacesso'){ u.vitalicio=false; u.planoAte=null; await store.saveUser(u); toast('Acesso removido'); }
  else if(act==='role'){ u.role=u.role==='admin'?'user':'admin'; await store.saveUser(u); toast(u.role==='admin'?'Promovido a admin':'Agora é usuário'); }
  else if(act==='excluir'){ if(!confirm(`Excluir o usuário ${u.nome}?`))return; await store.deleteUser(id); toast('Usuário excluído'); }
  await refreshSessao(); renderSidebar();
  renderAdmin($('#content'));
}
